# CI — the main quality gate.
#
# WHEN does this run?
#   - Every pull request targeting "main"
#   - Every push (merge) to "main"
#
# WHAT does it do?
#   Eleven independent jobs run in parallel:
#     1. linux-core  — shards the default fast suite across exact file lists
#     2. npm-test — runs the repo's top-level `npm test` wrapper as a literal gate
#     3. packaged-smoke — builds the npm package and runs smoke tests
#        against the packed tarball (catches packaging mistakes)
#     4. root-install-smoke — verifies the installed root-only launcher path
#        from the packed npm artifact with optional native deps omitted
#     5. native-smoke — exercises the packaged-native path on Linux
#        so the default launcher route is covered by blocking CI
#     6. native-unit — runs focused Rust unit tests for the native shell
#        bootstrap/parser/routing modules so native behavior has direct ownership
#     7. supported-native-smoke — verifies installed root+native artifacts on the
#        supported host matrix for the published distribution story
#     8. anvil-e2e-smoke — runs deposit/withdraw/ragequit happy paths
#        against the self-contained local Anvil fixture
#     9. coverage-guard — enforces coverage floors for key source directories
#    10. evals — runs machine-facing eval fixtures
#    11. conformance-core — checks required protocol/docs conformance
#
# If any job fails the PR gets a red X, telling you something is broken.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Only allow reading the repo — no write access needed here.
permissions:
  contents: read

# If you push again while CI is still running, cancel the old run
# so you don't waste GitHub Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Job 1: typecheck + build + unit/integration tests on Linux
  # -----------------------------------------------------------
  linux-core-shard:
    name: linux-core shard (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select linux-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job linux-core >> "$GITHUB_OUTPUT"

      - name: Skip linux-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping linux-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # --frozen-lockfile ensures CI uses the exact same dependency
      # versions you committed, instead of quietly upgrading anything.
      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Typecheck
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        run: npm run typecheck

      - name: Build
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        run: npm run build

      - name: Test core suite shard
        if: steps.select.outputs.should_run == 'true'
        run: node scripts/ci/test-shards.mjs --run --index ${{ matrix.shard }} --count 3 -- --smol

  linux-core:
    name: linux-core
    runs-on: ubuntu-latest
    needs:
      - linux-core-shard
    if: always()
    steps:
      - name: Verify linux-core shards
        env:
          SHARD_RESULT: ${{ needs.linux-core-shard.result }}
        run: |
          if [ "$SHARD_RESULT" != "success" ]; then
            echo "linux-core shards did not all succeed: $SHARD_RESULT"
            exit 1
          fi

  # -----------------------------------------------------------
  # Job 2: run the literal npm test wrapper as a hard gate
  # -----------------------------------------------------------
  npm-test:
    name: npm-test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select npm-test
        id: select
        run: node scripts/ci/select-jobs.mjs --job npm-test >> "$GITHUB_OUTPUT"

      - name: Skip npm-test
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping npm-test: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run npm test
        if: steps.select.outputs.should_run == 'true'
        run: npm test

  # -----------------------------------------------------------
  # Job 3: package the CLI and run smoke tests against it
  # -----------------------------------------------------------
  packaged-smoke:
    name: packaged-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.x"
          - "24.x"
          - "25.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Select packaged-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job packaged-smoke >> "$GITHUB_OUTPUT"

      - name: Skip packaged-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping packaged-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run packaged smoke tests
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:smoke

  # -----------------------------------------------------------
  # Job 4: verify the root-only installed artifact path directly
  # -----------------------------------------------------------
  root-install-smoke:
    name: root-install-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select root-install-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job root-install-smoke >> "$GITHUB_OUTPUT"

      - name: Skip root-install-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping root-install-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.select.outputs.should_run == 'true'
        run: npm run build

      - name: Run root-only installed artifact gate
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:artifacts:root

  # -----------------------------------------------------------
  # Job 5: packaged native smoke on the default Linux triplet
  # -----------------------------------------------------------
  native-smoke:
    name: native-smoke-node-${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.x"
          - "24.x"
          - "25.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Select native-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job native-smoke >> "$GITHUB_OUTPUT"

      - name: Skip native-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping native-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run native package smoke tests
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:smoke:native:package

  # -----------------------------------------------------------
  # Job 5: focused native Rust unit coverage for parser/routing ownership
  # -----------------------------------------------------------
  native-unit:
    name: native-unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select native-unit
        id: select
        run: node scripts/ci/select-jobs.mjs --job native-unit >> "$GITHUB_OUTPUT"

      - name: Skip native-unit
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping native-unit: ${{ steps.select.outputs.reason }}"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Run native Rust lint checks
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:native:fmt && npm run test:native:lint

      - name: Run native Rust unit tests
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:native

  # -----------------------------------------------------------
  # Job 6: installed root-plus-native verification on supported hosts.
  # Linux smoke already covers Node 22/24/25, so this heavier cross-OS
  # install lane stays on the recommended CI runtime to avoid tripling cost.
  # -----------------------------------------------------------
  supported-native-smoke:
    name: supported-native-smoke-${{ matrix.label }}-node-${{ matrix.node-version }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "25.x"
        include:
          - label: linux-x64-gnu
            runner: ubuntu-latest
          - label: win32-x64-msvc
            runner: windows-latest
          - label: win32-arm64-msvc
            runner: windows-11-arm
          - label: darwin-arm64
            runner: macos-latest
          - label: darwin-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Select supported-native-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job supported-native-smoke >> "$GITHUB_OUTPUT"

      - name: Skip supported-native-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping supported-native-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Build package
        if: steps.select.outputs.should_run == 'true'
        run: npm run build

      - name: Pack root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        id: pack-cli
        shell: bash
        run: |
          FILE="$(npm pack --silent)"
          echo "tarball=${FILE}" >> "${GITHUB_OUTPUT}"

      - name: Build release native shell
        if: steps.select.outputs.should_run == 'true'
        run: npm run native:build:release

      - name: Pack and verify native tarball
        if: steps.select.outputs.should_run == 'true'
        id: pack-native
        shell: bash
        run: |
          TARBALL="$(node scripts/pack-native-tarball.mjs --triplet "${{ matrix.label }}" --out-dir "dist-native/${{ matrix.label }}")"
          echo "tarball=${TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Verify installed release artifacts
        if: steps.select.outputs.should_run == 'true'
        shell: bash
        run: |
          node scripts/verify-release-install.mjs \
            --cli-tarball "${{ steps.pack-cli.outputs.tarball }}" \
            --native-tarball "${{ steps.pack-native.outputs.tarball }}"

  # -----------------------------------------------------------
  # Job 7: self-contained happy-path smoke coverage via Anvil
  # -----------------------------------------------------------
  anvil-e2e-smoke:
    name: anvil-e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select anvil-e2e-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job anvil-e2e-smoke >> "$GITHUB_OUTPUT"

      - name: Skip anvil-e2e-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping anvil-e2e-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Foundry
        if: steps.select.outputs.should_run == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Checkout contracts
        if: steps.select.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: 0xmatthewb/privacy-pools-core
          ref: a80836a47451e662f127af17e11430ffa976c234
          path: privacy-pools-core

      - name: Install contract dependencies
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: |
          corepack enable
          yarn --frozen-lockfile --network-concurrency 1

      - name: Normalize contract remappings
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: |
          ln -sfn @zk-kit/lean-imt.sol ../../node_modules/lean-imt
          sed -i.bak 's#^lean-imt/=.*$#lean-imt/=../../node_modules/lean-imt/#' remappings.txt
          rm -f remappings.txt.bak

      - name: Build contract artifacts
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: forge build

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run Anvil happy-path smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_CONTRACTS_ROOT: ${{ github.workspace }}/privacy-pools-core/packages/contracts
        run: npm run test:e2e:anvil:smoke

  # -----------------------------------------------------------
  # Job 8: enforce source-level coverage floors
  # -----------------------------------------------------------
  coverage-guard:
    name: coverage-guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select coverage-guard
        id: select
        run: node scripts/ci/select-jobs.mjs --job coverage-guard >> "$GITHUB_OUTPUT"

      - name: Skip coverage-guard
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping coverage-guard: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Enforce coverage thresholds
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:coverage

  # -----------------------------------------------------------
  # Job 9: agent-facing eval coverage
  # -----------------------------------------------------------
  evals:
    name: evals
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select evals
        id: select
        run: node scripts/ci/select-jobs.mjs --job evals >> "$GITHUB_OUTPUT"

      - name: Skip evals
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping evals: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run eval suites
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:evals

  # -----------------------------------------------------------
  # Job 10: required protocol/docs conformance
  # -----------------------------------------------------------
  conformance-core:
    name: conformance-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select conformance-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job conformance-core >> "$GITHUB_OUTPUT"

      - name: Skip conformance-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping conformance-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run core conformance
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:conformance
