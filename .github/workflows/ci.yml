# CI — the main quality gate.
#
# WHEN does this run?
#   - Every pull request targeting "main"
#   - Every push (merge) to "main"
#
# WHAT does it do?
#   The workflow runs shared JS and native-artifact prep jobs feeding the
#   packaging/install lanes:
#     1. linux-core  — shards the default fast suite across exact file lists
#     2. prepare-js-artifacts — builds and packs the JS CLI once for
#        packaging/install consumers in this workflow
#     3. prepare-native-binary — builds the Linux debug native shell once
#     4. packaged-smoke — runs smoke tests against the prepared npm package
#        against the packed tarball (catches packaging mistakes)
#     5. root-install-smoke — verifies the installed root-only launcher path
#        from the packed npm artifact with optional native deps omitted
#     6. native-smoke — exercises the packaged-native path on Linux
#        so the default launcher route is covered by blocking CI
#     7. native-unit — runs focused Rust unit tests for the native shell
#        bootstrap/parser/routing modules so native behavior has direct ownership
#     8. supported-native-smoke — verifies installed root+native artifacts on the
#        supported host matrix for the published distribution story
#     9. anvil-e2e-smoke — runs deposit/withdraw/ragequit happy paths
#        against the self-contained local Anvil fixture
#    10. coverage-guard — enforces coverage floors for key source directories
#    11. evals — runs machine-facing eval fixtures
#    12. conformance-core — checks required protocol/docs conformance
#
# If any job fails the PR gets a red X, telling you something is broken.

name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "native/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
      - "docs/contracts/**"
      - "docs/reference.md"
      - "skills/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - ".bun-version"
  push:
    branches:
      - main

# Only allow reading the repo — no write access needed here.
permissions:
  contents: read

# If you push again while CI is still running, cancel the old run
# so you don't waste GitHub Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Job 1: typecheck + build + unit/integration tests on Linux
  # -----------------------------------------------------------
  linux-core-shard:
    name: linux-core shard (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select linux-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job linux-core >> "$GITHUB_OUTPUT"

      - name: Skip linux-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping linux-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Cache TypeScript incremental build
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.js') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Typecheck
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        run: npm run typecheck

      - name: Build
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        run: npm run build

      - name: Test core suite shard
        if: steps.select.outputs.should_run == 'true'
        run: node scripts/ci/test-shards.mjs --run --index ${{ matrix.shard }} --count 3 -- --smol

  linux-core:
    name: linux-core
    runs-on: ubuntu-latest
    needs:
      - linux-core-shard
    if: always()
    steps:
      - name: Verify linux-core shards
        env:
          SHARD_RESULT: ${{ needs.linux-core-shard.result }}
        run: |
          if [ "$SHARD_RESULT" != "success" ]; then
            echo "linux-core shards did not all succeed: $SHARD_RESULT"
            exit 1
          fi

  # -----------------------------------------------------------
  # Job 2: build and pack the JS CLI once for packaging consumers
  # -----------------------------------------------------------
  prepare-js-artifacts:
    name: prepare-js-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      cli_tarball_name: ${{ steps.prepare.outputs.cli_tarball_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select ci-js-artifacts
        id: select
        run: node scripts/ci/select-jobs.mjs --job ci-js-artifacts >> "$GITHUB_OUTPUT"

      - name: Skip ci-js-artifacts
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping ci-js-artifacts: ${{ steps.select.outputs.reason }}"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Cache TypeScript incremental build
        if: steps.select.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.js') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-
            tsbuildinfo-${{ runner.os }}-

      - name: Prepare JS artifacts
        if: steps.select.outputs.should_run == 'true'
        id: prepare
        run: node scripts/ci/prepare-js-artifacts.mjs --artifact-root "${{ runner.temp }}/pp-ci-js-artifacts"

      - name: Upload dist artifact
        if: steps.select.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ci-js-dist
          path: ${{ steps.prepare.outputs.dist_dir }}/**
          if-no-files-found: error

      - name: Upload root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ci-js-cli-tarball
          path: ${{ steps.prepare.outputs.cli_tarball }}
          if-no-files-found: error

  # -----------------------------------------------------------
  # Job 3: build the Linux debug native shell once for native smoke lanes
  # -----------------------------------------------------------
  prepare-native-binary:
    name: prepare-native-binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell
          shared-key: native-shell-debug-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build native shell (debug)
        run: npm run native:build
      - name: Stage binary
        run: |
          mkdir -p .ci-artifacts/native
          cp native/shell/target/debug/privacy-pools-cli-native-shell .ci-artifacts/native/
      - uses: actions/upload-artifact@v6
        with:
          name: ci-native-binary-linux-x64-gnu
          path: .ci-artifacts/native/
          if-no-files-found: error

  # -----------------------------------------------------------
  # Job 4: package the CLI and run smoke tests against it
  # -----------------------------------------------------------
  packaged-smoke:
    name: packaged-smoke
    runs-on: ubuntu-latest
    needs:
      - prepare-js-artifacts
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.x"
          - "25.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select packaged-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job packaged-smoke >> "$GITHUB_OUTPUT"

      - name: Skip packaged-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping packaged-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Download root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-js-cli-tarball
          path: .ci-artifacts/root-tarball

      - name: Run packed smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_INSTALL_CLI_TARBALL: .ci-artifacts/root-tarball/${{ needs.prepare-js-artifacts.outputs.cli_tarball_name }}
        run: npm run test:smoke

  # -----------------------------------------------------------
  # Job 5: verify the root-only installed artifact path directly
  # -----------------------------------------------------------
  root-install-smoke:
    name: root-install-smoke
    runs-on: ubuntu-latest
    needs:
      - prepare-js-artifacts
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select root-install-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job root-install-smoke >> "$GITHUB_OUTPUT"

      - name: Skip root-install-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping root-install-smoke: ${{ steps.select.outputs.reason }}"

      - name: Download root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-js-cli-tarball
          path: .ci-artifacts/root-tarball

      - name: Run root-only installed artifact gate
        if: steps.select.outputs.should_run == 'true'
        run: |
          node scripts/verify-root-only-host-artifact.mjs \
            --cli-tarball ".ci-artifacts/root-tarball/${{ needs.prepare-js-artifacts.outputs.cli_tarball_name }}"

  # -----------------------------------------------------------
  # Job 6: packaged native smoke on the default Linux triplet
  # -----------------------------------------------------------
  native-smoke:
    name: native-smoke-node-${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs:
      - prepare-js-artifacts
      - prepare-native-binary
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.x"
          - "25.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select native-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job native-smoke >> "$GITHUB_OUTPUT"

      - name: Skip native-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping native-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Download prepared dist
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-js-dist
          path: dist

      - name: Download native binary
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-native-binary-linux-x64-gnu
          path: native/shell/target/debug/

      - name: Mark binary executable
        if: steps.select.outputs.should_run == 'true'
        run: chmod +x native/shell/target/debug/privacy-pools-cli-native-shell

      - name: Run native package smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_INSTALL_USE_EXISTING_DIST: "1"
        run: npm run test:smoke:native:package

  # -----------------------------------------------------------
  # Job 5: focused native Rust unit coverage for parser/routing ownership
  # -----------------------------------------------------------
  native-unit:
    name: native-unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select native-unit
        id: select
        run: node scripts/ci/select-jobs.mjs --job native-unit >> "$GITHUB_OUTPUT"

      - name: Skip native-unit
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping native-unit: ${{ steps.select.outputs.reason }}"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell
          shared-key: native-shell-debug-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run native Rust lint checks
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:native:fmt && npm run test:native:lint

      - name: Run native Rust unit tests
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:native

  # -----------------------------------------------------------
  # Job 8: installed root-plus-native verification on supported hosts.
  # Linux smoke already covers Node 22/23/24/25, so this heavier cross-OS
  # install lane stays on the recommended CI runtime to avoid tripling cost.
  # -----------------------------------------------------------
  supported-native-smoke:
    name: supported-native-smoke-${{ matrix.label }}-node-${{ matrix.node-version }}
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare-js-artifacts
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "25.x"
        include:
          - label: linux-x64-gnu
            runner: ubuntu-latest
          - label: win32-x64-msvc
            runner: windows-latest
          - label: win32-arm64-msvc
            runner: windows-11-arm
          - label: darwin-arm64
            runner: macos-latest
          - label: darwin-x64
            runner: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select supported-native-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job supported-native-smoke >> "$GITHUB_OUTPUT"

      - name: Skip supported-native-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping supported-native-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell
          shared-key: native-shell-release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Download root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-js-cli-tarball
          path: .ci-artifacts/root-tarball

      - name: Build release native shell
        if: steps.select.outputs.should_run == 'true'
        run: npm run native:build:release

      - name: Pack and verify native tarball
        if: steps.select.outputs.should_run == 'true'
        id: pack-native
        shell: bash
        run: |
          TARBALL="$(node scripts/pack-native-tarball.mjs --triplet "${{ matrix.label }}" --out-dir "dist-native/${{ matrix.label }}")"
          echo "tarball=${TARBALL}" >> "${GITHUB_OUTPUT}"

      - name: Verify installed release artifacts
        if: steps.select.outputs.should_run == 'true'
        shell: bash
        run: |
          node scripts/verify-release-install.mjs \
            --cli-tarball ".ci-artifacts/root-tarball/${{ needs.prepare-js-artifacts.outputs.cli_tarball_name }}" \
            --native-tarball "${{ steps.pack-native.outputs.tarball }}"

  # -----------------------------------------------------------
  # Job 9: self-contained happy-path smoke coverage via Anvil
  # -----------------------------------------------------------
  anvil-e2e-smoke:
    name: anvil-e2e-smoke
    runs-on: ubuntu-latest
    needs:
      - prepare-js-artifacts
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select anvil-e2e-smoke
        id: select
        run: node scripts/ci/select-jobs.mjs --job anvil-e2e-smoke >> "$GITHUB_OUTPUT"

      - name: Skip anvil-e2e-smoke
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping anvil-e2e-smoke: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell
          shared-key: native-shell-debug-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Foundry
        if: steps.select.outputs.should_run == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Download root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ci-js-cli-tarball
          path: .ci-artifacts/root-tarball

      - name: Run Anvil happy-path smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_INSTALL_CLI_TARBALL: .ci-artifacts/root-tarball/${{ needs.prepare-js-artifacts.outputs.cli_tarball_name }}
        run: npm run test:e2e:anvil:smoke

  # -----------------------------------------------------------
  # Job 10: enforce source-level coverage floors
  # -----------------------------------------------------------
  coverage-guard:
    name: coverage-guard
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select coverage-guard
        id: select
        run: node scripts/ci/select-jobs.mjs --job coverage-guard >> "$GITHUB_OUTPUT"

      - name: Skip coverage-guard
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping coverage-guard: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Enforce coverage thresholds
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:coverage

  # -----------------------------------------------------------
  # Job 11: agent-facing eval coverage
  # -----------------------------------------------------------
  evals:
    name: evals
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select evals
        id: select
        run: node scripts/ci/select-jobs.mjs --job evals >> "$GITHUB_OUTPUT"

      - name: Skip evals
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping evals: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run eval suites
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:evals

  # -----------------------------------------------------------
  # Job 12: required protocol/docs conformance
  # -----------------------------------------------------------
  conformance-core:
    name: conformance-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select conformance-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job conformance-core >> "$GITHUB_OUTPUT"

      - name: Skip conformance-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping conformance-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run live conformance
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:conformance
