# CI — the main quality gate.
#
# WHEN does this run?
#   - Every pull request targeting "main"
#   - Every push (merge) to "main"
#
# WHAT does it do?
#   Four independent jobs run in parallel:
#     1. linux-core  — typechecks, builds, and runs the default fast suite
#     2. packaged-smoke — builds the npm package and runs smoke tests
#        against the packaged output (catches packaging mistakes)
#     3. anvil-e2e-smoke — runs deposit/withdraw/ragequit happy paths
#        against a forked local chain via Anvil
#     4. coverage-guard — enforces coverage floors for key source directories
#
# If any job fails the PR gets a red X, telling you something is broken.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Only allow reading the repo — no write access needed here.
permissions:
  contents: read

# If you push again while CI is still running, cancel the old run
# so you don't waste GitHub Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Job 1: typecheck + build + unit/integration tests on Linux
  # -----------------------------------------------------------
  linux-core:
    name: linux-core
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # --frozen-lockfile ensures CI uses the exact same dependency
      # versions you committed, instead of quietly upgrading anything.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test core suite
        run: npm test

  # -----------------------------------------------------------
  # Job 2: package the CLI and run smoke tests against it
  # -----------------------------------------------------------
  packaged-smoke:
    name: packaged-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "24.x"
          - "25.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: npm run build

      - name: Run packaged smoke tests
        run: npm run test:smoke

  # -----------------------------------------------------------
  # Job 3: forked-chain happy-path smoke coverage via Anvil
  # -----------------------------------------------------------
  anvil-e2e-smoke:
    name: anvil-e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PP_ANVIL_FORK_URL: ${{ secrets.PP_ANVIL_FORK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Anvil happy-path smoke tests
        run: npm run test:e2e:anvil:smoke

  # -----------------------------------------------------------
  # Job 4: enforce source-level coverage floors
  # -----------------------------------------------------------
  coverage-guard:
    name: coverage-guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce coverage thresholds
        run: npm run test:coverage
