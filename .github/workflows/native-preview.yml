# Native Preview — benchmark the launcher/native path on preview branches.
#
# WHEN does this run?
#   - Pushes to native-preview/native-release branches
#   - PRs targeting native-preview/native-release branches
#   - Manually via the "Run workflow" button
#
# WHAT does it do?
#   Builds the current checkout, runs the benchmark harness across the JS,
#   launcher-binary-override, and direct-native lanes against `origin/main`,
#   and uploads the timing report.
#
# WHERE do results show up?
#   - The Actions step summary shows the benchmark table inline
#   - The workflow artifacts include the raw `native-bench.txt` report

name: Native Preview

on:
  push:
    branches:
      - native-preview
      - native-preview/**
      - native-release
      - native-release/**
  pull_request:
    branches:
      - native-preview
      - native-preview/**
      - native-release
      - native-release/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark harness
        run: node scripts/bench-cli.mjs --runtime all --base origin/main --runs 6 --warmup 1 | tee native-bench.txt

      - name: Publish benchmark summary
        shell: bash
        run: |
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat native-bench.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-bench
          path: native-bench.txt
          if-no-files-found: error
