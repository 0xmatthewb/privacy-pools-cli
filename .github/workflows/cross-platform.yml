# Cross Platform — non-blocking smoke tests on the supported native targets.
#
# WHEN does this run?
#   - Every pull request (any branch)
#   - Every push to "main"
#   - Manually via the "Run workflow" button on GitHub
#
# WHAT does it do?
#   Runs the packaged JS smoke tests and the native package smoke lane
#   on Linux x64, Windows x64, Windows ARM64, Apple Silicon, and
#   Intel macOS on the recommended CI runtime while the faster Linux smoke
#   lanes continue to cover the full supported Node range.
#   parallel. This catches target-specific bugs (e.g. path separators,
#   line endings, missing system libraries, native package resolution)
#   before release day.
#
# WHY "non-blocking"?
#   These tests are informational. They won't block you from merging
#   a PR — only the main CI workflow gates merges. This keeps your
#   day-to-day workflow fast while still surfacing cross-platform
#   issues you can fix before a release.

name: Cross Platform (non-blocking)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Cancel older runs for the same PR / branch.
concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-js-artifacts:
    name: prepare-js-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      cli_tarball_name: ${{ steps.prepare.outputs.cli_tarball_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select cross-platform
        id: select
        run: node scripts/ci/select-jobs.mjs --job cross-platform >> "$GITHUB_OUTPUT"

      - name: Skip cross-platform
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping cross-platform: ${{ steps.select.outputs.reason }}"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Prepare JS artifacts
        if: steps.select.outputs.should_run == 'true'
        id: prepare
        run: node scripts/ci/prepare-js-artifacts.mjs --artifact-root "${{ runner.temp }}/pp-cross-platform-js-artifacts"

      - name: Upload dist artifact
        if: steps.select.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: cross-platform-js-dist
          path: ${{ steps.prepare.outputs.dist_dir }}/**
          if-no-files-found: error

      - name: Upload root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: cross-platform-js-cli-tarball
          path: ${{ steps.prepare.outputs.cli_tarball }}
          if-no-files-found: error

  smoke-matrix:
    name: smoke-${{ matrix.label }}-node-${{ matrix.node-version }}
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare-js-artifacts
    timeout-minutes: 30

    strategy:
      # Don't cancel the other OSes if one fails — you want to see
      # the full picture of which platforms pass and which don't.
      fail-fast: false
      matrix:
        node-version:
          - "25.x"
        include:
          - label: linux-x64-gnu
            runner: ubuntu-latest
          - label: win32-x64-msvc
            runner: windows-latest
          - label: win32-arm64-msvc
            runner: windows-11-arm
          - label: darwin-arm64
            runner: macos-latest
          - label: darwin-x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select cross-platform
        id: select
        run: node scripts/ci/select-jobs.mjs --job cross-platform >> "$GITHUB_OUTPUT"

      - name: Skip cross-platform
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping cross-platform: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Download prepared dist
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: cross-platform-js-dist
          path: dist

      - name: Download root CLI tarball
        if: steps.select.outputs.should_run == 'true'
        uses: actions/download-artifact@v6
        with:
          name: cross-platform-js-cli-tarball
          path: .ci-artifacts/root-tarball

      - name: Run packaged smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_INSTALL_CLI_TARBALL: .ci-artifacts/root-tarball/${{ needs.prepare-js-artifacts.outputs.cli_tarball_name }}
        run: npm run test:smoke

      - name: Run native package smoke tests
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_INSTALL_USE_EXISTING_DIST: "1"
        run: npm run test:smoke:native:package
