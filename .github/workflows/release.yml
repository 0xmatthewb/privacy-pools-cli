# Release Artifact — builds and publishes a GitHub Release.
#
# WHEN does this run?
#   - When you push a git tag that starts with "v" (e.g. v1.2.3)
#   - Manually via the "Run workflow" button (you type an existing tag)
#
# WHAT does it do?  (seven sequential stages)
#   1. validate  — runs the release-readiness suite as `npm run test:release`
#                  to make sure the tagged code is healthy.
#   2. package   — creates an npm tarball (.tgz) of the CLI.
#   3. package-native — builds exact-version native package tarballs for the
#                  supported host triplets.
#   4. publish-native — publishes the native optional packages to npm and
#                  verifies they resolve at the tagged version.
#   5. publish-root — publishes the root JS launcher package to npm after the
#                  native packages are live.
#   6. verify-registry-install — installs the published npm package from the
#                  live registry on supported hosts and proves native resolution.
#   7. release   — attaches the npm tarball, native tarballs, and checksum
#                  manifest to a GitHub Release page.
#
# HOW to create a release:
#   In your terminal:
#     git tag v1.2.3          # create the tag locally
#     git push origin v1.2.3  # push the tag to GitHub → triggers this workflow
#
#   Or use the "Run workflow" button on GitHub and type the tag name.
#
# SAFETY NOTE:
#   cancel-in-progress is FALSE here — once a release starts, a second
#   push won't cancel it mid-flight. This prevents half-published releases.

name: Release Artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Stage 1: Run the release-readiness suite to make sure the tag is safe
  # -----------------------------------------------------------
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Checkout contracts
        uses: actions/checkout@v6
        with:
          repository: 0xmatthewb/privacy-pools-core
          ref: a80836a47451e662f127af17e11430ffa976c234
          path: privacy-pools-core

      - name: Install contract dependencies
        working-directory: privacy-pools-core/packages/contracts
        run: |
          corepack enable
          yarn --frozen-lockfile --network-concurrency 1

      - name: Normalize contract remappings
        working-directory: privacy-pools-core/packages/contracts
        run: |
          ln -sfn @zk-kit/lean-imt.sol ../../node_modules/lean-imt
          sed -i.bak 's#^lean-imt/=.*$#lean-imt/=../../node_modules/lean-imt/#' remappings.txt
          rm -f remappings.txt.bak

      - name: Build contract artifacts
        working-directory: privacy-pools-core/packages/contracts
        run: forge build

      - name: Install dependencies
        run: npm ci

      - name: Run release-readiness suite
        env:
          PP_CONTRACTS_ROOT: ${{ github.workspace }}/privacy-pools-core/packages/contracts
        run: npm run test:release

  # -----------------------------------------------------------
  # Stage 2: Create the distributable npm package
  # This only runs after "validate" passes.
  # -----------------------------------------------------------
  package:
    name: package
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Figure out which tag we're releasing. If triggered by a
      # tag push, use that tag. If triggered manually, use the
      # tag the user typed in.
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "Tag is required."
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      # If someone typed a tag manually, make sure it actually
      # exists on GitHub. This prevents releasing phantom tags.
      - name: Verify manual tag exists on origin
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if ! git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} does not exist on origin. Create and push the tag first."
            exit 1
          fi

      - name: Validate release tag and native dependency versions
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${TAG} does not match package.json version ${PKG_VERSION}."
            exit 1
          fi

          node - <<'NODE'
          const pkg = require("./package.json");
          const expected = pkg.version;
          const optionalDependencies = pkg.optionalDependencies ?? {};
          const mismatched = Object.entries(optionalDependencies).filter(
            ([name, version]) =>
              name.startsWith("@0xmatthewb/privacy-pools-cli-native-") && version !== expected,
          );
          if (mismatched.length > 0) {
            console.error(
              "Native optional dependency versions must match package.json version:",
              mismatched,
            );
            process.exit(1);
          }
          NODE

      # "npm pack" creates a .tgz file — the same format npm uses
      # when you run "npm install <package>".
      - name: Pack npm tarball
        id: pack
        shell: bash
        run: |
          FILE="$(npm pack --silent)"
          echo "tarball=${FILE}" >> "${GITHUB_OUTPUT}"

      # Save the tarball so the next job can download it.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  # -----------------------------------------------------------
  # Stage 2b: Build the native shell packages for each supported host triplet
  # -----------------------------------------------------------
  package-native:
    name: native-${{ matrix.triplet }}
    needs: package
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - triplet: darwin-arm64
            runner: macos-latest
          - triplet: darwin-x64
            runner: macos-15-intel
          - triplet: linux-x64-gnu
            runner: ubuntu-latest
          - triplet: win32-x64-msvc
            runner: windows-latest
          - triplet: win32-arm64-msvc
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Download root npm package artifact
        uses: actions/download-artifact@v6
        with:
          name: npm-package
          path: dist-root

      - name: Run native smoke test
        run: npm run test:smoke:native:package

      - name: Build release native shell
        run: npm run native:build:release

      - name: Pack native package
        shell: bash
        run: |
          TARBALL="$(node scripts/pack-native-tarball.mjs --triplet "${{ matrix.triplet }}" --out-dir "dist-native/${{ matrix.triplet }}")"
          echo "Packed ${TARBALL}"

      - name: Upload native package artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-package-${{ matrix.triplet }}
          path: dist-native/*.tgz
          if-no-files-found: error

      - name: Verify installed release artifacts
        shell: bash
        run: |
          CLI_TARBALL="$(echo dist-root/*.tgz)"
          NATIVE_TARBALL="$(echo dist-native/*.tgz)"
          node scripts/verify-release-install.mjs \
            --cli-tarball "${CLI_TARBALL}" \
            --native-tarball "${NATIVE_TARBALL}"

  # -----------------------------------------------------------
  # Stage 5: Publish the root JS launcher package to npm
  # This only runs after the native packages are live so installs can
  # resolve the exact-version optional native package immediately.
  # GitHub schedules this by `needs`, so the root publish job can stay near the
  # registry verification steps even though the native publish job is declared
  # later in this file.
  # -----------------------------------------------------------
  publish-root:
    name: publish-root
    needs:
      - package
      - publish-native
    runs-on: ubuntu-latest
    environment:
      name: native-release-signoff
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm publish token is configured
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is required to publish the root npm package."
            exit 1
          fi

      - name: Download root npm package artifact
        uses: actions/download-artifact@v6
        with:
          name: npm-package
          path: release-artifacts/npm

      - name: Publish and verify root npm package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE="$(node -p "require('./package.json').name")"
          CLI_TARBALL="$(echo release-artifacts/npm/*.tgz)"

          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} already published; verifying registry entry."
          else
            npm publish "${CLI_TARBALL}" --access public
          fi

          npm view "${PACKAGE}@${VERSION}" version

  # -----------------------------------------------------------
  # Stage 4: Publish the native optional packages to npm
  # This only runs after the native package jobs succeed.
  # -----------------------------------------------------------
  publish-native:
    name: publish-native
    needs:
      - package
      - package-native
    runs-on: ubuntu-latest
    environment:
      name: native-release-signoff
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@0xmatthewb"

      - name: Ensure npm publish token is configured
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "NPM_TOKEN secret is required to publish native optional packages."
            exit 1
          fi

      - name: Download native darwin-arm64 artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-darwin-arm64
          path: release-artifacts/native/darwin-arm64

      - name: Download native darwin-x64 artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-darwin-x64
          path: release-artifacts/native/darwin-x64

      - name: Download native linux-x64-gnu artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-linux-x64-gnu
          path: release-artifacts/native/linux-x64-gnu

      - name: Download native win32-x64-msvc artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-win32-x64-msvc
          path: release-artifacts/native/win32-x64-msvc

      - name: Download native win32-arm64-msvc artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-win32-arm64-msvc
          path: release-artifacts/native/win32-arm64-msvc

      - name: Publish and verify native npm packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"

          for TRIPLET in \
            darwin-arm64 \
            darwin-x64 \
            linux-x64-gnu \
            win32-x64-msvc \
            win32-arm64-msvc
          do
            PACKAGE="$(
              TRIPLET="${TRIPLET}" node --input-type=module -e \
                "import { nativePackageNameForTriplet } from './src/native-distribution.js'; process.stdout.write(nativePackageNameForTriplet(process.env.TRIPLET) ?? '');"
            )"
            if [[ -z "${PACKAGE}" ]]; then
              echo "Unsupported native triplet ${TRIPLET}."
              exit 1
            fi
            TARBALL="$(echo release-artifacts/native/${TRIPLET}/*.tgz)"

            if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE}@${VERSION} already published; verifying registry entry."
            else
              npm publish "${TARBALL}" --access public
            fi

            npm view "${PACKAGE}@${VERSION}" version
          done

  # -----------------------------------------------------------
  # Stage 6: Verify the live npm registry install path
  # This only runs after the root package and native packages are live.
  # -----------------------------------------------------------
  verify-registry-install:
    name: registry-install-${{ matrix.triplet }}
    needs:
      - publish-native
      - publish-root
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - triplet: darwin-arm64
            runner: macos-latest
          - triplet: darwin-x64
            runner: macos-15-intel
          - triplet: linux-x64-gnu
            runner: ubuntu-latest
          - triplet: win32-x64-msvc
            runner: windows-latest
          - triplet: win32-arm64-msvc
            runner: windows-11-arm
    environment:
      name: native-release-signoff
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@0xmatthewb"

      - name: Verify npm registry install
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE="$(node -p "require('./package.json').name")"
          node scripts/verify-registry-install.mjs \
            --package "${PACKAGE}" \
            --version "${VERSION}"

  # -----------------------------------------------------------
  # Stage 7: Create or update the GitHub Release page
  # This only runs after the JS package, native package, npm publish, and
  # registry install verification jobs succeed.
  # -----------------------------------------------------------
  release:
    name: github-release
    needs:
      - package
      - package-native
      - publish-root
      - publish-native
      - verify-registry-install
    runs-on: ubuntu-latest
    environment:
      name: native-release-signoff
    # This job needs write access to create the Release page.
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v6
        with:
          name: npm-package
          path: release-artifacts/npm

      - name: Download native darwin-arm64 artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-darwin-arm64
          path: release-artifacts/native/darwin-arm64

      - name: Download native darwin-x64 artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-darwin-x64
          path: release-artifacts/native/darwin-x64

      - name: Download native linux-x64-gnu artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-linux-x64-gnu
          path: release-artifacts/native/linux-x64-gnu

      - name: Download native win32-x64-msvc artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-win32-x64-msvc
          path: release-artifacts/native/win32-x64-msvc

      - name: Download native win32-arm64-msvc artifact
        uses: actions/download-artifact@v6
        with:
          name: native-package-win32-arm64-msvc
          path: release-artifacts/native/win32-arm64-msvc

      - name: Generate checksum manifest
        shell: bash
        working-directory: release-artifacts
        run: |
          find . -type f -name '*.tgz' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksum manifest
        shell: bash
        working-directory: release-artifacts
        run: |
          cosign sign-blob \
            --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt

      - name: Attach tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          files: |
            release-artifacts/npm/*.tgz
            release-artifacts/native/**/*.tgz
            release-artifacts/SHA256SUMS.txt
            release-artifacts/SHA256SUMS.txt.sig
            release-artifacts/SHA256SUMS.txt.pem
          generate_release_notes: true
          overwrite_files: true
