# Frontend Parity — informative checks against the website client.
#
# WHEN does this run?
#   - Every pull request (non-blocking visibility on PRs)
#   - Automatically every day at 3:47 AM UTC
#   - Manually via the "Run workflow" button on GitHub
#
# WHAT does it do?
#   Runs the frontend-dependent parity checks that compare the CLI's
#   ASP/relayer client assumptions against the website repo. This is
#   intentionally separate from the core conformance workflow so a
#   temporarily private or unavailable frontend repo does not block merges.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Frontend Parity" in the
#   left sidebar to see pass/fail history.

name: Frontend Parity

on:
  pull_request:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-parity:
    name: frontend-parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend parity tests
        run: npm run test:conformance:frontend
