# Frontend Parity — informative checks against the website client.
#
# WHEN does this run?
#   - Every pull request (non-blocking visibility on PRs)
#   - Automatically every day at 3:47 AM UTC
#   - Manually via the "Run workflow" button on GitHub
#
# WHAT does it do?
#   Runs the focused frontend-only parity slice that compares the CLI's
#   ASP/relayer and website-facing assumptions against the public website
#   repo. The blocking conformance suite already covers this live path; this
#   workflow keeps a narrower website-only lane visible on PRs.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Frontend Parity" in the
#   left sidebar to see pass/fail history.

name: Frontend Parity

on:
  pull_request:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-parity:
    name: frontend-parity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select frontend-parity
        id: select
        run: node scripts/ci/select-jobs.mjs --job frontend-parity >> "$GITHUB_OUTPUT"

      - name: Skip frontend-parity
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping frontend-parity: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run frontend parity tests
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:conformance:frontend
