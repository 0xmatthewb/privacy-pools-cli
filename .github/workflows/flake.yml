# Flake detection — informative randomized and repeated test passes.
#
# WHEN does this run?
#   - Every pull request (changed-path selected)
#   - Daily on schedule
#   - Manually via the "Run workflow" button
#
# WHAT does it do?
#   - Runs the repo's full `npm run test:flake` contract
#   - That includes randomized ordering, repeated stateful suites, packaged JS smoke,
#     packaged native smoke, and current-host installed-artifact verification
#   - Provisions Rust so the native/artifact lanes run for real in CI
#
# WHY separate?
#   This workflow is intentionally informative, not a required merge gate.

name: Flake Detection

on:
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "scripts/**"
      - "native/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".bun-version"
      - ".github/workflows/flake.yml"
  schedule:
    - cron: "19 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-core:
    name: flake-core
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select flake-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job flake-core >> "$GITHUB_OUTPUT"

      - name: Skip flake-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping flake-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell
          shared-key: native-shell-debug-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run flake suite
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_FLAKE_SEED: ${{ github.run_id }}-${{ github.run_attempt }}
        run: npm run test:flake
