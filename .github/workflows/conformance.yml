# Conformance — nightly scheduled core conformance tests.
#
# WHEN does this run?
#   - Automatically every day at 3:17 AM UTC (a cron schedule)
#   - Manually via the "Run workflow" button on GitHub
#
# WHAT does it do?
#   Runs the core conformance suite, which verifies the CLI still
#   behaves correctly against protocol specs and generated artifacts.
#   Frontend parity checks live in a separate non-blocking workflow.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Conformance" in the
#   left sidebar to see pass/fail history.

name: Conformance

on:
  schedule:
    # Runs daily at 03:17 UTC. The odd minute avoids the hourly
    # stampede when many repos use :00 or :30.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run conformance tests
        run: npm run test:conformance
