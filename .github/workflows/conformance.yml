# Conformance — nightly scheduled live upstream conformance tests.
#
# WHEN does this run?
#   - Automatically every day at 3:17 AM UTC (a cron schedule)
#   - Manually via the "Run workflow" button on GitHub
#
# WHAT does it do?
#   Runs the blocking live conformance suite against the public npm SDK
#   plus the public 0xbow-io core and website repos.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Conformance" in the
#   left sidebar to see pass/fail history.

name: Conformance

on:
  schedule:
    # Runs daily at 03:17 UTC. The odd minute avoids the hourly
    # stampede when many repos use :00 or :30.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance-shard:
    name: conformance shard (${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          - 1
          - 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Select conformance-core
        id: select
        run: node scripts/ci/select-jobs.mjs --job conformance-core >> "$GITHUB_OUTPUT"

      - name: Skip conformance-core
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping conformance-core: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run script checks
        if: steps.select.outputs.should_run == 'true' && matrix.shard == 1
        run: npm run test:scripts

      - name: Build
        if: steps.select.outputs.should_run == 'true'
        run: npm run build

      - name: Run conformance shard
        if: steps.select.outputs.should_run == 'true'
        run: node scripts/ci/test-shards.mjs --run --target conformance --index ${{ matrix.shard }} --count 2

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    needs:
      - conformance-shard
    if: always()
    steps:
      - name: Verify conformance shards
        env:
          SHARD_RESULT: ${{ needs.conformance-shard.result }}
        run: |
          if [ "$SHARD_RESULT" != "success" ]; then
            echo "conformance shards did not all succeed: $SHARD_RESULT"
            exit 1
          fi
