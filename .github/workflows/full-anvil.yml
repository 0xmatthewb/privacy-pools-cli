# Full Anvil — informative end-to-end coverage for the full local-fixture matrix.
#
# WHEN does this run?
#   - Every pull request targeting "main"
#   - Every push (merge) to "main"
#   - Manually via the "Run workflow" button
#
# WHAT does it do?
#   Runs the complete Anvil matrix as `npm run test:e2e:anvil`, including
#   the saved-flow and `--new-wallet` journeys that are too heavy for the
#   required fast CI lane. The suite uses the repo's committed contract
#   fixture and bundled proving assets, so it does not need an external
#   contracts checkout.
#
# WHY separate from the main CI workflow?
#   The required CI workflow intentionally keeps the Anvil gate to the smoke
#   subset so routine PR feedback stays fast. This workflow surfaces the full
#   matrix earlier than release tags without turning every required PR check
#   into the full release lane.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Full Anvil" in the left sidebar.

name: Full Anvil

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-anvil-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anvil-e2e-full:
    name: anvil-e2e-full
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select full-anvil
        id: select
        run: node scripts/ci/select-jobs.mjs --job full-anvil >> "$GITHUB_OUTPUT"

      - name: Skip full-anvil
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping full-anvil: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Install Foundry
        if: steps.select.outputs.should_run == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run full Anvil end-to-end suite
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:e2e:anvil
