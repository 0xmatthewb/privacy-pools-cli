# Full Anvil — informative end-to-end coverage for the full local-fixture matrix.
#
# WHEN does this run?
#   - Every pull request targeting "main"
#   - Every push (merge) to "main"
#   - Manually via the "Run workflow" button
#
# WHAT does it do?
#   Runs the complete Anvil matrix as `npm run test:e2e:anvil`, including
#   the saved-flow and `--new-wallet` journeys that are too heavy for the
#   required fast CI lane.
#
# WHY separate from the main CI workflow?
#   The required CI workflow intentionally keeps the Anvil gate to the smoke
#   subset so routine PR feedback stays fast. This workflow surfaces the full
#   matrix earlier than release tags without turning every required PR check
#   into the full release lane.
#
# WHERE do results show up?
#   Go to the "Actions" tab on GitHub → click "Full Anvil" in the left sidebar.

name: Full Anvil

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-anvil-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anvil-e2e-full:
    name: anvil-e2e-full
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select full-anvil
        id: select
        run: node scripts/ci/select-jobs.mjs --job full-anvil >> "$GITHUB_OUTPUT"

      - name: Skip full-anvil
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping full-anvil: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install Foundry
        if: steps.select.outputs.should_run == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Checkout contracts
        if: steps.select.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          repository: 0xmatthewb/privacy-pools-core
          ref: a80836a47451e662f127af17e11430ffa976c234
          path: privacy-pools-core

      - name: Install contract dependencies
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: |
          corepack enable
          yarn --frozen-lockfile --network-concurrency 1

      - name: Normalize contract remappings
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: |
          ln -sfn @zk-kit/lean-imt.sol ../../node_modules/lean-imt
          sed -i.bak 's#^lean-imt/=.*$#lean-imt/=../../node_modules/lean-imt/#' remappings.txt
          rm -f remappings.txt.bak

      - name: Build contract artifacts
        if: steps.select.outputs.should_run == 'true'
        working-directory: privacy-pools-core/packages/contracts
        run: forge build

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: bun install --frozen-lockfile

      - name: Run full Anvil end-to-end suite
        if: steps.select.outputs.should_run == 'true'
        env:
          PP_CONTRACTS_ROOT: ${{ github.workspace }}/privacy-pools-core/packages/contracts
        run: npm run test:e2e:anvil
