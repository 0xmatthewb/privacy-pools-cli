# Anvil Flake — heavier shared-state reruns for the representative smoke lane.
#
# WHEN does this run?
#   - Every pull request (changed-path selected)
#   - Every push to "main" or "rust-refactor"
#   - Daily on schedule
#   - Manually via the "Run workflow" button
#
# WHAT does it do?
#   - Runs the shared-Anvil smoke lane twice through `npm run test:flake:anvil`
#   - Re-exercises native launcher, packaged install, and fund-moving smoke paths
#   - Keeps the lighter flake workflow focused on fast subprocess suites
#   - Uses the repo-local contract fixture instead of preparing a separate
#     contracts checkout on the runner
#
# WHY separate?
#   Stateful Anvil reruns are valuable, but they are slower and provision Foundry
#   and Rust. Keeping them in their own informational lane preserves quick
#   feedback while still surfacing stateful flakes before release day.

name: Anvil Flake Detection

on:
  pull_request:
  push:
    branches:
      - main
      - rust-refactor
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-anvil-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-anvil:
    name: flake-anvil
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"

      - name: Select flake-anvil
        id: select
        run: node scripts/ci/select-jobs.mjs --job flake-anvil >> "$GITHUB_OUTPUT"

      - name: Skip flake-anvil
        if: steps.select.outputs.should_run != 'true'
        run: |
          echo "Skipping flake-anvil: ${{ steps.select.outputs.reason }}"

      - name: Setup Bun
        if: steps.select.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Rust
        if: steps.select.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        if: steps.select.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/shell

      - name: Install Foundry
        if: steps.select.outputs.should_run == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        if: steps.select.outputs.should_run == 'true'
        run: npm ci

      - name: Run shared-Anvil flake suite
        if: steps.select.outputs.should_run == 'true'
        run: npm run test:flake:anvil
